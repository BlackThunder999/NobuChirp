<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>School Stealth 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#000; overflow:hidden; font-family:Arial,sans-serif; height:100vh; width:100vw; touch-action:manipulation; }
        canvas { display:block; }

        #topUI {
            position:fixed; top:8px; left:8px; right:8px; z-index:10;
            display:flex; align-items:center; gap:6px;
            background:rgba(0,0,0,0.7); padding:6px 10px; border-radius:8px;
            color:#fff; font-size:11px; pointer-events:none;
        }
        #timeUI { color:#ffd700; font-weight:bold; }
        #suspicionBar { flex:1; height:7px; background:#333; border-radius:3px; overflow:hidden; }
        #suspicionFill { height:100%; width:0%; background:linear-gradient(90deg,#0f0,#ff0,#f00); transition:width 0.3s; }
        #suspicionText { color:#ccc; font-size:10px; }
        #staminaMiniBar { width:60px; height:5px; background:#333; border-radius:2px; overflow:hidden; }
        #staminaMiniFill { height:100%; width:100%; background:#ffd700; transition:width 0.2s; }

        #controlsUI {
            position:fixed; bottom:15px; left:8px; right:8px; z-index:10;
            display:flex; justify-content:space-between; align-items:flex-end; pointer-events:none;
        }
        #joystickZone { width:110px; height:110px; pointer-events:auto; position:relative; }
        #joystickBase { width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.2); position:relative; }
        #joystickKnob { width:45px; height:45px; border-radius:50%; background:rgba(255,255,255,0.3); border:2px solid rgba(255,255,255,0.5); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
        #rightControls { display:flex; flex-direction:column; gap:6px; align-items:flex-end; pointer-events:auto; }
        .btn-row { display:flex; gap:6px; }
        .game-btn { width:50px; height:50px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.1); color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .game-btn:active { background:rgba(255,255,255,0.3); transform:scale(0.9); }
        .btn-run { border-color:#ffd700; }
        .btn-jump { border-color:#0bf; }
        .btn-action { border-color:#f69; width:60px; height:60px; font-size:26px; }

        #menuScreen { position:fixed; inset:0; z-index:100; background:linear-gradient(135deg,#1a1a2e,#16213e,#0a0a0a); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
        #menuScreen.hidden { display:none; }
        .menu-title { font-size:28px; color:#ffd700; text-shadow:0 0 20px rgba(255,215,0,0.5); text-align:center; }
        .menu-btn { width:180px; padding:14px; font-size:16px; font-weight:bold; border:2px solid #ffd700; background:rgba(255,215,0,0.1); color:#ffd700; border-radius:10px; cursor:pointer; }
        .menu-btn:active { background:#ffd700; color:#000; }

        #messageBox { position:fixed; bottom:170px; left:10px; right:10px; z-index:15; background:rgba(0,0,0,0.9); border:2px solid #ffd700; border-radius:10px; padding:12px; color:#fff; font-size:13px; display:none; text-align:center; }
        #messageBox.show { display:block; }

        #endScreen { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
        #endScreen.show { display:flex; }
        #endTitle { font-size:24px; color:#ffd700; }
        #endText { color:#fff; font-size:14px; text-align:center; }
        #endScore { color:#888; font-size:12px; }
    </style>
</head>
<body>

    <div id="topUI">
        <span id="timeUI">🕐 08:30</span>
        <div id="suspicionBar"><div id="suspicionFill"></div></div>
        <span id="suspicionText">0%</span>
        <div id="staminaMiniBar"><div id="staminaMiniFill"></div></div>
    </div>

    <div id="controlsUI">
        <div id="joystickZone"><div id="joystickBase"><div id="joystickKnob"></div></div></div>
        <div id="rightControls">
            <div class="btn-row">
                <button class="game-btn btn-run" id="btnRun">🏃</button>
                <button class="game-btn btn-jump" id="btnJump">🦘</button>
            </div>
            <button class="game-btn btn-action" id="btnAction">👋</button>
        </div>
    </div>

    <div id="menuScreen">
        <div class="menu-title">🏫 Школа<br>Выживания 3D</div>
        <button class="menu-btn" id="btnPlay">▶ ИГРАТЬ</button>
    </div>

    <div id="messageBox"><span id="msgText"></span></div>

    <div id="endScreen">
        <div id="endTitle"></div>
        <div id="endText"></div>
        <div id="endScore"></div>
        <button class="menu-btn" id="btnRestart">Играть заново</button>
    </div>

    <script>
        // ==================== THREE.JS ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a0f0a);
        scene.fog = new THREE.Fog(0x1a0f0a, 15, 50);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.5, 80);
        camera.position.set(0, 16, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Освещение
        scene.add(new THREE.AmbientLight(0x404060, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffeedd, 0.7);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 60;
        dirLight.shadow.camera.left = -25;
        dirLight.shadow.camera.right = 25;
        dirLight.shadow.camera.top = 25;
        dirLight.shadow.camera.bottom = -25;
        scene.add(dirLight);

        for (let z = -14; z <= 14; z += 7)
            for (let x = -16; x <= 16; x += 8) {
                const pl = new THREE.PointLight(0xffcc88, 0.5, 10);
                pl.position.set(x, 3.5, z);
                pl.castShadow = true;
                scene.add(pl);
            }

        // Пол
        const floorGeo = new THREE.PlaneGeometry(36, 36);
        const floor = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 0.9 }));
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        scene.add(floor);

        for (let z = -17; z < 18; z += 2)
            for (let x = -17; x < 18; x += 2) {
                const tile = new THREE.Mesh(
                    new THREE.PlaneGeometry(1.8, 1.8),
                    new THREE.MeshStandardMaterial({ color: Math.random()>0.5?0x4a3020:0x362318, roughness:0.85 })
                );
                tile.rotation.x = -Math.PI/2;
                tile.position.set(x+1, 0.01, z+1);
                tile.receiveShadow = true;
                scene.add(tile);
            }

        // Стены
        function wall(x,y,z,w,h,d,c=0x8b7355) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:c,roughness:0.7}));
            m.position.set(x,y,z);
            m.castShadow = m.receiveShadow = true;
            scene.add(m);
            return m;
        }
        wall(0,2.5,-18,36,5,0.5);
        wall(0,2.5,18,36,5,0.5);
        wall(-18,2.5,0,0.5,5,36);
        wall(18,2.5,0,0.5,5,36);
        wall(-7,2.5,-9,0.4,5,10,0xa09080);
        wall(7,2.5,-9,0.4,5,10,0xa09080);
        wall(-7,2.5,9,0.4,5,10,0xa09080);
        wall(7,2.5,9,0.4,5,10,0xa09080);
        wall(0,2.5,-5,14,5,0.4,0xa09080);
        wall(0,2.5,5,14,5,0.4,0xa09080);

        // Парты
        function desk(x,y,z) {
            const t = new THREE.Mesh(new THREE.BoxGeometry(1.5,0.1,1), new THREE.MeshStandardMaterial({color:0xdeb887,roughness:0.5}));
            t.position.set(x,0.9,z);
            t.castShadow = t.receiveShadow = true;
            scene.add(t);
            for (let lx=-0.5; lx<=0.5; lx+=1) {
                for (let lz=-0.35; lz<=0.35; lz+=0.7) {
                    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.8), new THREE.MeshStandardMaterial({color:0x888888,roughness:0.5,metalness:0.5}));
                    leg.position.set(x+lx,0.4,z+lz);
                    leg.castShadow = true;
                    scene.add(leg);
                }
            }
        }
        for (let row=0; row<3; row++) for (let col=0; col<2; col++) {
            desk(-13+col*2,0,-13+row*2);
            desk(13-col*2,0,-13+row*2);
        }

        // ==================== ДВЕРИ ====================
        const doors = [];
        function door(x,y,z,name) {
            const frame = new THREE.Mesh(new THREE.BoxGeometry(1.2,2.8,0.2), new THREE.MeshStandardMaterial({color:0x5c4033,roughness:0.6}));
            frame.position.set(x,1.4,z);
            frame.castShadow = true;
            scene.add(frame);
            const d = new THREE.Mesh(new THREE.BoxGeometry(0.5,2.6,0.1), new THREE.MeshStandardMaterial({color:0x8b6914,roughness:0.4}));
            d.position.set(x,1.3,z);
            d.castShadow = true;
            d.userData = {name,isOpen:false,origX:x,openX:x+0.7};
            scene.add(d);
            doors.push(d);
            return d;
        }
        door(-9,1.4,0,'Каб. Математики 📐');
        door(9,1.4,0,'Каб. Физики ⚡');
        door(-4,1.4,-5.2,'Туалет 🚽');
        door(4,1.4,-5.2,'Медпункт 🏥');
        door(-4,1.4,5.2,'Каб. Логопеда 🗣️');
        door(4,1.4,5.2,'Раздевалка 🧥');

        // ==================== ИГРОК ====================
        const playerGeo = new THREE.CapsuleGeometry(0.35,1,4,8);
        const playerMesh = new THREE.Mesh(playerGeo, new THREE.MeshStandardMaterial({color:0xffd700,roughness:0.3}));
        playerMesh.position.set(0,0.7,0);
        playerMesh.castShadow = true;
        scene.add(playerMesh);
        const eyeGeo = new THREE.SphereGeometry(0.07);
        const eyeMat = new THREE.MeshStandardMaterial({color:0x000000});
        const le = new THREE.Mesh(eyeGeo,eyeMat);
        le.position.set(-0.1,0.9,0.3);
        playerMesh.add(le);
        const re = new THREE.Mesh(eyeGeo,eyeMat);
        re.position.set(0.1,0.9,0.3);
        playerMesh.add(re);

        const shadowMesh = new THREE.Mesh(
            new THREE.CircleGeometry(0.35,16),
            new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.3})
        );
        shadowMesh.rotation.x = -Math.PI/2;
        shadowMesh.position.y = 0.02;
        scene.add(shadowMesh);

        // ==================== УЧИТЕЛЯ ====================
        const teachers = [];
        function teacher(x,y,z,color,minX,maxX,minZ,maxZ) {
            const body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.35,1,4,8),
                new THREE.MeshStandardMaterial({color,roughness:0.4})
            );
            body.position.set(x,y,z);
            body.castShadow = true;
            scene.add(body);
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.3),
                new THREE.MeshStandardMaterial({color:0xffd5b4,roughness:0.6})
            );
            head.position.y = 0.8;
            body.add(head);
            const hat = new THREE.Mesh(
                new THREE.CylinderGeometry(0.32,0.35,0.2,8),
                new THREE.MeshStandardMaterial({color:0x333333,roughness:0.4})
            );
            hat.position.y = 1.05;
            body.add(hat);

            scene.add(body);
            return {
                mesh: body,
                minX, maxX, minZ, maxZ,
                dirX: Math.random()>0.5?1:-1,
                dirZ: Math.random()>0.5?1:-1,
                speed: 0.03 + Math.random()*0.02
            };
        }

        teachers.push(teacher(-11,0.7,-10,0xff4444,-16,-6,-15,-5));
        teachers.push(teacher(11,0.7,10,0x4444ff,6,16,5,15));
        teachers.push(teacher(0,0.7,-15,0xff8844,-5,5,-17,-10));

        // ==================== УКРЫТИЯ (маркеры) ====================
        const hideouts = [
            { x:-4, z:-5.2, name:'Туалет 🚽', radius:2 },
            { x:4, z:-5.2, name:'Медпункт 🏥', radius:2 },
            { x:-4, z:5.2, name:'Каб. Логопеда 🗣️', radius:2 },
            { x:4, z:5.2, name:'Раздевалка 🧥', radius:2 }
        ];

        // ==================== ПЕРЕМЕННЫЕ ====================
        let gameRunning = false;
        let suspicion = 0;
        let gameTime = 0;
        const DAY_LENGTH = 360;
        let score = 0;
        let stamina = 100;
        let isRunning = false;
        let isJumping = false;
        let jumpVel = 0;
        let joystickX = 0, joystickY = 0, joystickActive = false;
        let camAngle = 0;
        let keys = {};

        function showMsg(text) {
            const box = document.getElementById('messageBox');
            document.getElementById('msgText').textContent = text;
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 2000);
        }

        // ==================== ДЖОЙСТИК ====================
        const jz = document.getElementById('joystickZone');
        const jk = document.getElementById('joystickKnob');
        jz.addEventListener('touchstart', e => { e.preventDefault(); joystickActive=true; updateJoy(e.touches[0]); });
        jz.addEventListener('touchmove', e => { e.preventDefault(); if(joystickActive) updateJoy(e.touches[0]); });
        jz.addEventListener('touchend', () => { joystickActive=false; joystickX=0; joystickY=0; jk.style.transform='translate(-50%,-50%)'; });

        function updateJoy(t) {
            const r = jz.getBoundingClientRect();
            const cx = r.left+r.width/2, cy = r.top+r.height/2;
            const md = r.width/2-22;
            let dx = t.clientX-cx, dy = t.clientY-cy;
            const d = Math.sqrt(dx*dx+dy*dy);
            if(d>md){ dx=dx/d*md; dy=dy/d*md; }
            jk.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joystickX = dx/md; joystickY = dy/md;
        }

        document.addEventListener('touchmove', e => {
            for(const t of e.touches)
                if(t.clientX > window.innerWidth/2 && !joystickActive)
                    camAngle += (t.movementX||0)*0.005;
        });

        // ==================== КНОПКИ ====================
        document.getElementById('btnRun').addEventListener('touchstart', e => { e.preventDefault(); if(stamina>0) isRunning=true; });
        document.getElementById('btnRun').addEventListener('touchend', () => { isRunning=false; });
        document.getElementById('btnJump').addEventListener('touchstart', e => { e.preventDefault(); if(!isJumping){ isJumping=true; jumpVel=0.25; } });
        document.getElementById('btnAction').addEventListener('touchstart', e => { e.preventDefault(); interact(); });

        document.addEventListener('keydown', e => { keys[e.key]=true; if(e.key==='e'||e.key==='E') interact(); });
        document.addEventListener('keyup', e => { keys[e.key]=false; });

        // ==================== ВЗАИМОДЕЙСТВИЕ ====================
        function interact() {
            const px = playerMesh.position.x, pz = playerMesh.position.z;

            // Двери
            for(const d of doors) {
                const dx = px-d.position.x, dz = pz-d.position.z;
                if(Math.sqrt(dx*dx+dz*dz) < 2.5) {
                    d.userData.isOpen = !d.userData.isOpen;
                    d.position.x = d.userData.isOpen ? d.userData.openX : d.userData.origX;
                    showMsg(d.userData.isOpen ? `🚪 Открыто: ${d.userData.name}` : `🚪 Закрыто: ${d.userData.name}`);
                    return;
                }
            }

            // Укрытия
            for(const h of hideouts) {
                const dx = px-h.x, dz = pz-h.z;
                if(Math.sqrt(dx*dx+dz*dz) < h.radius) {
                    suspicion = Math.max(0, suspicion-30);
                    score += 100;
                    showMsg(`${h.name}: Спрятался! Подозрение -30%`);
                    return;
                }
            }
        }

        // ==================== ИГРОВОЙ ЦИКЛ ====================
        function update() {
            if(!gameRunning) return;

            let speed = isRunning ? 0.2 : 0.1;
            let mx = 0, mz = 0;

            if(joystickActive) { mx = joystickX*speed; mz = -joystickY*speed; }
            if(keys['w']||keys['ArrowUp']) mz = -speed;
            if(keys['s']||keys['ArrowDown']) mz = speed;
            if(keys['a']||keys['ArrowLeft']) mx = -speed;
            if(keys['d']||keys['ArrowRight']) mx = speed;
            if(keys['Shift']&&stamina>0) isRunning=true;
            else if(!keys['Shift']) isRunning=false;
            if((keys[' ']||keys['Space'])&&!isJumping){ isJumping=true; jumpVel=0.25; }

            if(isRunning && (Math.abs(mx)>0||Math.abs(mz)>0)) {
                stamina = Math.max(0, stamina-0.5);
                if(stamina<=0) isRunning=false;
            } else stamina = Math.min(100, stamina+0.3);

            if(isJumping) {
                playerMesh.position.y += jumpVel;
                jumpVel -= 0.015;
                if(playerMesh.position.y <= 0.7) { playerMesh.position.y=0.7; isJumping=false; jumpVel=0; }
            }

            const cos = Math.cos(camAngle), sin = Math.sin(camAngle);
            playerMesh.position.x += mx*cos - mz*sin;
            playerMesh.position.z += mx*sin + mz*cos;
            playerMesh.position.x = Math.max(-17, Math.min(17, playerMesh.position.x));
            playerMesh.position.z = Math.max(-17, Math.min(17, playerMesh.position.z));

            shadowMesh.position.x = playerMesh.position.x;
            shadowMesh.position.z = playerMesh.position.z;

            camera.position.set(
                playerMesh.position.x - sin*10,
                14,
                playerMesh.position.z - cos*10
            );
            camera.lookAt(playerMesh.position.x, 1, playerMesh.position.z);

            // Учителя
            for(const t of teachers) {
                t.mesh.position.x += t.dirX*t.speed;
                t.mesh.position.z += t.dirZ*t.speed;
                if(t.mesh.position.x > t.maxX || t.mesh.position.x < t.minX) t.dirX *= -1;
                if(t.mesh.position.z > t.maxZ || t.mesh.position.z < t.minZ) t.dirZ *= -1;
                if(Math.random()<0.01) { t.dirX=Math.random()>0.5?1:-1; t.dirZ=Math.random()>0.5?1:-1; }

                const dx = playerMesh.position.x-t.mesh.position.x;
                const dz = playerMesh.position.z-t.mesh.position.z;
                if(Math.sqrt(dx*dx+dz*dz) < 2.8) {
                    suspicion = Math.min(100, suspicion+0.5);
                    if(suspicion>=100) endGame(false);
                }
            }

            let near = false;
            for(const t of teachers)
                if(Math.sqrt((playerMesh.position.x-t.mesh.position.x)**2+(playerMesh.position.z-t.mesh.position.z)**2)<2.8) near=true;
            if(!near) suspicion = Math.max(0, suspicion-0.06);

            gameTime += 1/60;
            if(gameTime >= DAY_LENGTH) endGame(true);

            document.getElementById('timeUI').textContent = `🕐 ${String(Math.floor(8+gameTime/60)).padStart(2,'0')}:${String(Math.floor(gameTime%60)).padStart(2,'0')}`;
            document.getElementById('suspicionFill').style.width = suspicion+'%';
            document.getElementById('suspicionText').textContent = Math.floor(suspicion)+'%';
            document.getElementById('staminaMiniFill').style.width = stamina+'%';
        }

        function endGame(win) {
            gameRunning = false;
            document.getElementById('endScreen').classList.add('show');
            if(win && suspicion<20) {
                document.getElementById('endTitle').textContent='🏆 НИНДЗЯ!';
                document.getElementById('endText').textContent='Идеальный день!';
                score+=5000;
            } else if(win) {
                document.getElementById('endTitle').textContent='👍 ВЫЖИЛ';
                document.getElementById('endText').textContent='День окончен!';
                score+=1000;
            } else {
                document.getElementById('endTitle').textContent='💀 ПОЙМАН';
                document.getElementById('endText').textContent='Директор вызвал родителей...';
            }
            document.getElementById('endScore').textContent = `Очки: ${score}`;
        }

        function gameLoop() { update(); renderer.render(scene, camera); requestAnimationFrame(gameLoop); }

        // ==================== СТАРТ ====================
        document.getElementById('btnPlay').addEventListener('click', () => {
            document.getElementById('menuScreen').classList.add('hidden');
            gameRunning=true; suspicion=0; gameTime=0; score=0; stamina=100;
            playerMesh.position.set(0,0.7,0);
        });
        document.getElementById('btnRestart').addEventListener('click', () => {
            document.getElementById('endScreen').classList.remove('show');
            gameRunning=true; suspicion=0; gameTime=0; score=0; stamina=100;
            playerMesh.position.set(0,0.7,0);
            for(const t of teachers) t.mesh.position.set(
                (t.minX+t.maxX)/2, 0.7, (t.minZ+t.maxZ)/2
            );
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        gameLoop();
    </script>
</body>
</html>
