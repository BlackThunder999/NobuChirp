<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nobu Social</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo-container">
                    <div class="logo-icon"><i class="fas fa-feather-alt"></i></div>
                    <h1 class="logo-text">Nobu<span class="logo-accent">Social</span></h1>
                </div>
                <div class="nickname-panel" id="nicknamePanel">
                    <div class="nickname-display" id="nicknameDisplay">
                        <div class="avatar-circle" id="avatarCircle"><span id="avatarInitial">?</span></div>
                        <span class="nickname-text" id="nicknameText">Гость</span>
                        <button class="edit-nickname-btn" id="editNicknameBtn" title="Настройки"><i class="fas fa-pen"></i></button>
                    </div>
                    <div class="nickname-editor hidden" id="nicknameEditor">
                        <input type="text" class="nickname-input" id="nicknameInput" placeholder="Никнейм" maxlength="30">
                        <button class="save-nickname-btn" id="saveNicknameBtn"><i class="fas fa-check"></i></button>
                        <button class="cancel-nickname-btn" id="cancelNicknameBtn"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="post-composer">
                <div class="composer-header">
                    <div class="composer-avatar"><span id="composerAvatarInitial">?</span></div>
                    <div class="composer-info">
                        <span class="composer-nickname" id="composerNickname">Гость</span>
                    </div>
                </div>
                <div class="composer-body">
                    <textarea class="post-textarea" id="postTextarea" placeholder="Что нового?" maxlength="500" rows="3"></textarea>
                    <div class="composer-footer">
                        <div class="char-counter"><span id="charCount">0</span>/500</div>
                        <button class="publish-btn" id="publishBtn" disabled>
                            <i class="fas fa-paper-plane"></i> <span>Опубликовать</span>
                        </button>
                    </div>
                </div>
                <div class="composer-error hidden" id="composerError"><span id="composerErrorText"></span></div>
            </div>

            <div class="feed-container">
                <div class="feed-header">
                    <h2 class="feed-title"><i class="fas fa-stream"></i> Лента</h2>
                    <div class="feed-status" id="feedStatus">
                        <span class="status-dot" id="statusDot"></span>
                        <span id="statusText">Подключено</span>
                    </div>
                </div>
                <div class="posts-feed" id="postsFeed">
                    <div class="feed-loading" id="feedLoading"><i class="fas fa-spinner fa-spin"></i> Загрузка...</div>
                    <div class="feed-empty hidden" id="feedEmpty">
                        <i class="fas fa-inbox"></i>
                        <h3>Нет постов</h3>
                        <p>Будьте первым!</p>
                    </div>
                    <div class="feed-error hidden" id="feedError">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Ошибка</h3>
                        <button class="retry-btn" id="retryBtn">Повторить</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
