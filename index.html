<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sibiria Airlines Virtual | Главная</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 50%, #0a0e17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            max-width: 900px;
            width: 100%;
            padding: 20px;
        }
        .main-card {
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            border: 1px solid rgba(100, 150, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(0,160,255,0.6));
        }
        h1 {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff, #7eb8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            letter-spacing: 3px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }
        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px 15px;
            transition: 0.3s;
        }
        .stat-box:hover {
            border-color: #4dabf7;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .stat-label {
            font-size: 0.85em;
            text-transform: uppercase;
            color: #7a8ba8;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 2.8em;
            font-weight: bold;
        }
        .flights { color: #4dabf7; }
        .crashes { color: #ff6b6b; }
        .landings { color: #51cf66; }
        .nav {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 16px 35px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: rgba(0,160,255,0.2);
            border-color: #4dabf7;
            box-shadow: 0 10px 25px rgba(0,160,255,0.3);
        }
        .btn-primary {
            background: #0066cc;
            border-color: #0066cc;
        }
        .btn-primary:hover { background: #0077ee; }
        @media (max-width: 600px) {
            .stats { grid-template-columns: 1fr; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <svg class="logo" viewBox="0 0 100 100" fill="none">
                <rect width="100" height="100" rx="20" fill="#1a2b4a"/>
                <path d="M20 70L40 30H60L80 70M35 55H65M30 50H70" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="50" cy="45" r="4" fill="white"/>
            </svg>
            <h1>SIBIRIA AIRLINES VIRTUAL</h1>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Всего рейсов</div>
                    <div class="stat-value flights" id="totalFlights">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Катастроф</div>
                    <div class="stat-value crashes" id="totalCrashes">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Удачных посадок</div>
                    <div class="stat-value landings" id="totalLandings">0</div>
                </div>
            </div>
            <div class="nav">
                <a href="booking.html" class="btn btn-primary">🛫 Бронирование</a>
                <a href="dispatch.html" class="btn">📡 Диспетчерская</a>
                <a href="admin.html" class="btn">⚙️ Админ-панель</a>
            </div>
        </div>
    </div>
    <script>
        const supabase = window.supabase.createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );
        async function load() {
            const { count: fCount } = await supabase.from('flights').select('*', { count: 'exact', head: true });
            const { data: st } = await supabase.from('stats').select('*').single();
            document.getElementById('totalFlights').textContent = fCount || 0;
            document.getElementById('totalCrashes').textContent = st?.crashes || 0;
            document.getElementById('totalLandings').textContent = st?.successful_landings || 0;
        }
        load();
    </script>
</body>
</html>
