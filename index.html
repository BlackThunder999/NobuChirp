<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nobu Social</title>
    <link rel="stylesheet" href="style.css?v=5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><i class="fa-solid fa-feather"></i></div>
                <h1>Nobu<span style="color:#888;">Social</span></h1>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>
            <form id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" placeholder="Email" class="auth-input" required>
                <input type="password" id="loginPassword" placeholder="Пароль" class="auth-input" required>
                <button type="submit" class="auth-btn">Войти</button>
                <div class="auth-error" id="loginError"></div>
            </form>
            <form id="registerForm" class="auth-form hidden">
                <input type="text" id="regNickname" placeholder="Никнейм" class="auth-input" maxlength="30" required>
                <input type="email" id="regEmail" placeholder="Email" class="auth-input" required>
                <input type="password" id="regPassword" placeholder="Пароль (минимум 6 символов)" class="auth-input" minlength="6" required>
                <button type="submit" class="auth-btn">Зарегистрироваться</button>
                <div class="auth-error" id="regError"></div>
            </form>
        </div>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div class="app hidden" id="appContainer">
        <header class="header">
            <div class="header-inner">
                <div class="logo">
                    <div class="logo-icon"><i class="fa-solid fa-feather"></i></div>
                    <span class="logo-text">Nobu</span>
                </div>
                <div class="user-badge">
                    <div class="user-avatar" id="userAvatar"><span id="userInitial">?</span></div>
                    <span class="user-name" id="userName">Гость</span>
                    <button class="user-settings-btn" id="userSettingsBtn"><i class="fa-solid fa-gear"></i></button>
                    <button class="user-logout-btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="composer">
                <div class="composer-top">
                    <div class="composer-avatar" id="composerAvatar"><span id="composerInitial">?</span></div>
                    <span class="composer-placeholder">Что нового?</span>
                </div>
                <textarea class="composer-input" id="postTextarea" placeholder="Что у вас нового?" maxlength="500" rows="3"></textarea>
                <div class="composer-bottom">
                    <div class="composer-left">
                        <button class="composer-icon-btn" id="attachBtn"><i class="fa-solid fa-image"></i></button>
                        <input type="file" id="imageInput" accept="image/*" hidden>
                    </div>
                    <div class="composer-right">
                        <span class="composer-counter" id="charCounter">0 / 500</span>
                        <button class="publish-btn" id="publishBtn" disabled>
                            <i class="fa-solid fa-paper-plane"></i> <span>Отправить</span>
                        </button>
                    </div>
                </div>
                <div class="image-preview hidden" id="imagePreview">
                    <img id="previewImg" alt="Превью">
                    <button class="image-preview-remove" id="removePreviewBtn"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="composer-error hidden" id="composerError"><span id="composerErrorText"></span></div>
            </div>

            <div class="feed">
                <h2 class="feed-title">Лента</h2>
                <div class="feed-list" id="postsFeed">
                    <div class="feed-state" id="feedLoading"><i class="fa-solid fa-spinner fa-spin-pulse"></i> Загрузка...</div>
                    <div class="feed-state hidden" id="feedEmpty"><i class="fa-solid fa-inbox"></i><h3>Нет постов</h3></div>
                    <div class="feed-state hidden" id="feedError"><i class="fa-solid fa-triangle-exclamation"></i><h3>Ошибка</h3><button class="retry-btn" id="retryBtn">Повторить</button></div>
                </div>
            </div>
        </main>
    </div>

    <!-- РЕДАКТОР ПРОФИЛЯ -->
    <div class="modal-overlay hidden" id="profileModal">
        <div class="modal-card">
            <h3>Профиль</h3>
            <div class="modal-avatar-section">
                <div class="modal-avatar" id="modalAvatar"><span id="modalInitial">?</span></div>
                <label class="modal-avatar-btn"><i class="fa-solid fa-camera"></i> Фото<input type="file" id="modalAvatarInput" accept="image/*" hidden></label>
            </div>
            <input type="text" class="modal-input" id="modalNickname" placeholder="Никнейм" maxlength="30">
            <div class="modal-actions">
                <button class="btn-cancel" id="modalCancel">Отмена</button>
                <button class="btn-save" id="modalSave">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js?v=5"></script>
</body>
</html>
