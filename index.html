<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Школа Выживания: Стелс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 900px;
            background: #111;
            overflow: hidden;
        }

        /* Меню */
        #menuScreen {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        #menuScreen.hidden {
            display: none;
        }

        .menu-title {
            font-size: 36px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            text-align: center;
            margin-bottom: 10px;
        }

        .menu-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
            text-align: center;
        }

        .menu-btn {
            width: 220px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ffd700;
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .menu-btn:active {
            background: #ffd700;
            color: #000;
            transform: scale(0.95);
        }

        .settings-btn {
            border-color: #fff;
            color: #fff;
            background: rgba(255,255,255,0.1);
            font-size: 16px;
            padding: 12px;
        }

        .settings-btn:active {
            background: #fff;
            color: #000;
        }

        /* Настройки */
        #settingsScreen {
            position: absolute;
            inset: 0;
            z-index: 101;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        #settingsScreen.show {
            display: flex;
        }

        .settings-title {
            font-size: 28px;
            color: #fff;
        }

        .setting-row {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 250px;
            justify-content: space-between;
        }

        .setting-label {
            color: #fff;
            font-size: 16px;
        }

        .toggle {
            width: 60px;
            height: 30px;
            background: #333;
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }

        .toggle.on {
            background: #4caf50;
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            transition: left 0.3s;
        }

        .toggle.on::after {
            left: 33px;
        }

        /* Верхняя панель */
        #topBar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #timeDisplay {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            min-width: 80px;
        }

        #suspicionBar {
            flex: 1;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }

        #suspicionFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.3s;
        }

        #suspicionText {
            color: #fff;
            font-size: 11px;
            min-width: 100px;
            text-align: right;
        }

        /* Холст */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Нижняя панель */
        #bottomBar {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
            pointer-events: none;
        }

        #joystickContainer {
            width: 130px;
            height: 130px;
            pointer-events: auto;
        }

        #joystickBase {
            width: 130px;
            height: 130px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            position: relative;
            border: 2px solid rgba(255,255,255,0.2);
        }

        #joystickThumb {
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.35);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.5);
        }

        #buttonsContainer {
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: flex-end;
            pointer-events: auto;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn:active {
            transform: scale(0.85);
            background: rgba(255,255,255,0.3);
        }

        .run-btn {
            border-color: #ffd700;
            background: rgba(255,215,0,0.15);
        }

        .jump-btn {
            border-color: #00bfff;
            background: rgba(0,191,255,0.15);
        }

        .action-btn-main {
            border-color: #ff69b4;
            background: rgba(255,105,180,0.15);
            width: 70px;
            height: 70px;
        }

        #staminaBar {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 5px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        #staminaFill {
            height: 100%;
            width: 100%;
            background: #ffd700;
            transition: width 0.2s;
        }

        /* Диалог */
        #dialogBox {
            position: absolute;
            bottom: 180px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            z-index: 15;
            display: none;
        }

        #dialogBox.show {
            display: block;
        }

        #dialogText {
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        #dialogOptions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .dialog-btn {
            padding: 10px 15px;
            background: rgba(255,215,0,0.1);
            border: 1px solid #ffd700;
            color: #ffd700;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            flex: 1;
            min-width: 100px;
        }

        .dialog-btn:active {
            background: #ffd700;
            color: #000;
        }

        /* Миникарта */
        #miniMap {
            position: absolute;
            top: 50px;
            right: 10px;
            width: 90px;
            height: 90px;
            z-index: 8;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            overflow: hidden;
        }

        #miniMapCanvas {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
        }

        /* Концовка */
        #endScreen {
            position: absolute;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        #endScreen.show {
            display: flex;
        }

        #endTitle {
            font-size: 30px;
            color: #ffd700;
        }

        #endText {
            color: #fff;
            font-size: 16px;
            text-align: center;
            max-width: 300px;
        }

        #endScore {
            color: #888;
            font-size: 14px;
        }

        .restart-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: rgba(255,215,0,0.1);
            border: 2px solid #ffd700;
            color: #ffd700;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .restart-btn:active {
            background: #ffd700;
            color: #000;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- Главное меню -->
        <div id="menuScreen">
            <div class="menu-title">🏫 Школа<br>Выживания</div>
            <div class="menu-subtitle">Стелс-экшен с мемами</div>
            <button class="menu-btn" id="btnPlay">▶ ИГРАТЬ</button>
            <button class="menu-btn settings-btn" id="btnSettings">⚙ НАСТРОЙКИ</button>
            <div style="color:#555;font-size:11px;margin-top:20px;">Управление: джойстик + кнопки</div>
        </div>

        <!-- Настройки -->
        <div id="settingsScreen">
            <div class="settings-title">⚙ Настройки</div>
            <div class="setting-row">
                <span class="setting-label">🔊 Звук</span>
                <div class="toggle on" id="toggleSound"></div>
            </div>
            <button class="menu-btn settings-btn" id="btnBack">↩ НАЗАД</button>
        </div>

        <!-- Верхняя панель -->
        <div id="topBar" class="hidden">
            <div id="timeDisplay">🕐 08:30</div>
            <div id="suspicionBar"><div id="suspicionFill"></div></div>
            <div id="suspicionText">0%</div>
        </div>

        <!-- Игровой холст -->
        <canvas id="gameCanvas" class="hidden"></canvas>

        <!-- Нижняя панель -->
        <div id="bottomBar" class="hidden">
            <div id="joystickContainer">
                <div id="joystickBase">
                    <div id="joystickThumb"></div>
                </div>
            </div>
            <div id="buttonsContainer">
                <button class="action-btn run-btn" id="btnRun">
                    🏃
                    <div id="staminaBar"><div id="staminaFill"></div></div>
                </button>
                <button class="action-btn jump-btn" id="btnJump">🦘</button>
                <button class="action-btn action-btn-main" id="btnAction">👋</button>
            </div>
        </div>

        <!-- Диалог -->
        <div id="dialogBox">
            <div id="dialogText"></div>
            <div id="dialogOptions"></div>
        </div>

        <!-- Миникарта -->
        <div id="miniMap" class="hidden">
            <canvas id="miniMapCanvas"></canvas>
        </div>

        <!-- Концовка -->
        <div id="endScreen">
            <div id="endTitle"></div>
            <div id="endText"></div>
            <div id="endScore"></div>
            <button class="restart-btn" id="btnRestart">Играть заново</button>
        </div>
    </div>

    <script>
        // ==================== НАСТРОЙКИ ====================
        let soundEnabled = true;
        const sounds = {};

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('toggleSound').classList.toggle('on', soundEnabled);
        }

        function playSound(name) {
            if (!soundEnabled) return;
            // Заглушка - можно добавить реальные звуки
            console.log('🔊', name);
        }

        // ==================== МЕНЮ ====================
        const menuScreen = document.getElementById('menuScreen');
        const settingsScreen = document.getElementById('settingsScreen');
        const topBar = document.getElementById('topBar');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bottomBar = document.getElementById('bottomBar');
        const miniMap = document.getElementById('miniMap');
        const miniMapCanvas = document.getElementById('miniMapCanvas');
        const miniCtx = miniMapCanvas.getContext('2d');
        const dialogBox = document.getElementById('dialogBox');
        const endScreen = document.getElementById('endScreen');

        document.getElementById('btnPlay').addEventListener('click', startGame);
        document.getElementById('btnSettings').addEventListener('click', () => {
            settingsScreen.classList.add('show');
        });
        document.getElementById('btnBack').addEventListener('click', () => {
            settingsScreen.classList.remove('show');
        });
        document.getElementById('toggleSound').addEventListener('click', toggleSound);
        document.getElementById('btnRestart').addEventListener('click', () => {
            endScreen.classList.remove('show');
            startGame();
        });

        // ==================== ИГРОВЫЕ ПЕРЕМЕННЫЕ ====================
        let gameRunning = false;
        let player = { x: 250, y: 400, vx: 0, vy: 0, speed: 2, runSpeed: 4, isRunning: false, stamina: 100, maxStamina: 100, isJumping: false, jumpVel: 0, facing: 0 };
        let teachers = [];
        let hideouts = [];
        let npcs = [];
        let suspicion = 0;
        let gameTime = 0; // в секундах, начиная с 8:30 (30600 секунд)
        const DAY_LENGTH = 480; // 8 минут реального времени = учебный день
        let score = 0;
        let joystickActive = false;
        let joystickX = 0;
        let joystickY = 0;
        let keys = {};

        // ==================== ЗАПУСК ИГРЫ ====================
        function startGame() {
            menuScreen.classList.add('hidden');
            settingsScreen.classList.remove('show');
            topBar.classList.remove('hidden');
            canvas.classList.remove('hidden');
            bottomBar.classList.remove('hidden');
            miniMap.classList.remove('hidden');
            endScreen.classList.remove('show');
            dialogBox.classList.remove('show');

            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            miniMapCanvas.width = miniMapCanvas.offsetWidth;
            miniMapCanvas.height = miniMapCanvas.offsetHeight;

            // Сброс
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
            player.vx = 0;
            player.vy = 0;
            player.stamina = player.maxStamina;
            player.isRunning = false;
            player.isJumping = false;
            suspicion = 0;
            score = 0;
            gameTime = 0;

            // Создаём учителей
            teachers = [
                { x: 100, y: 200, vx: 1, vy: 0, patrol: 'horizontal', name: 'Математичка', emoji: '👩‍🏫', patrolMin: 50, patrolMax: 400 },
                { x: 300, y: 350, vx: 0, vy: 0.8, patrol: 'vertical', name: 'Физик', emoji: '👨‍🔬', patrolMin: 150, patrolMax: 500 },
                { x: 200, y: 100, vx: -0.7, vy: 0.5, patrol: 'random', name: 'Директор', emoji: '👨‍💼', patrolMin: 0, patrolMax: 600 }
            ];

            // Укрытия
            hideouts = [
                { x: 50, y: 80, w: 80, h: 60, name: 'Туалет', emoji: '🚽', safe: true },
                { x: 350, y: 300, w: 70, h: 50, name: 'Каб. логопеда', emoji: '🗣️', safe: true },
                { x: 150, y: 450, w: 80, h: 55, name: 'Медпункт', emoji: '🏥', safe: true },
                { x: 380, y: 100, w: 60, h: 70, name: 'Раздевалка', emoji: '🧥', safe: true }
            ];

            // NPC
            npcs = [
                { x: 80, y: 300, name: 'Друн', emoji: '🍺', dialog: ['Слышь... дай списать?', 'Забей, я сам не знаю.', 'Где столовая?'] },
                { x: 320, y: 420, name: 'Скуф', emoji: '🛋️', dialog: ['На физру? Не, я тут.', 'Мой диван - моя крепость.', 'Отстань, я отдыхаю.'] },
                { x: 200, y: 150, name: 'Медсестра', emoji: '🧑‍⚕️', dialog: ['Что болит?', 'Температуры нет, иди на урок.', 'Ладно, дам справку на 10 минут.'] }
            ];

            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        // ==================== ДЖОЙСТИК ====================
        const joystickBase = document.getElementById('joystickBase');
        const joystickThumb = document.getElementById('joystickThumb');
        const joystickContainer = document.getElementById('joystickContainer');

        joystickContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            joystickActive = true;
            updateJoystick(e.touches[0]);
        });

        joystickContainer.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (joystickActive) updateJoystick(e.touches[0]);
        });

        joystickContainer.addEventListener('touchend', () => {
            joystickActive = false;
            joystickX = 0;
            joystickY = 0;
            joystickThumb.style.transform = 'translate(-50%, -50%)';
            player.vx = 0;
            player.vy = 0;
        });

        function updateJoystick(touch) {
            const rect = joystickBase.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const maxDist = rect.width / 2 - 28;
            
            let dx = touch.clientX - cx;
            let dy = touch.clientY - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > maxDist) {
                dx = dx / dist * maxDist;
                dy = dy / dist * maxDist;
            }
            
            joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joystickX = dx / maxDist;
            joystickY = dy / maxDist;
        }

        // ==================== КНОПКИ ====================
        const btnRun = document.getElementById('btnRun');
        const btnJump = document.getElementById('btnJump');
        const btnAction = document.getElementById('btnAction');

        btnRun.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (player.stamina > 0) {
                player.isRunning = true;
            }
        });

        btnRun.addEventListener('touchend', () => {
            player.isRunning = false;
        });

        btnJump.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!player.isJumping) {
                player.isJumping = true;
                player.jumpVel = -8;
                playSound('jump');
            }
        });

        btnAction.addEventListener('touchstart', (e) => {
            e.preventDefault();
            interact();
        });

        // ==================== КЛАВИАТУРА (для десктопа) ====================
        document.addEventListener('keydown', (e) => { keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // ==================== ВЗАИМОДЕЙСТВИЕ ====================
        function interact() {
            // Проверка NPC рядом
            for (const npc of npcs) {
                const dx = player.x - npc.x;
                const dy = player.y - npc.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 80) {
                    showDialog(npc);
                    return;
                }
            }

            // Проверка укрытий
            for (const h of hideouts) {
                const dx = player.x - (h.x + h.w / 2);
                const dy = player.y - (h.y + h.h / 2);
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 70) {
                    hideInHideout(h);
                    return;
                }
            }
        }

        function showDialog(npc) {
            const idx = Math.floor(Math.random() * npc.dialog.length);
            document.getElementById('dialogText').textContent = `${npc.emoji} ${npc.name}: "${npc.dialog[idx]}"`;
            document.getElementById('dialogOptions').innerHTML = `
                <button class="dialog-btn" onclick="closeDialog()">Ладно</button>
                ${npc.name === 'Медсестра' ? '<button class="dialog-btn" onclick="getSickNote()">Притвориться больным</button>' : ''}
            `;
            dialogBox.classList.add('show');
            playSound('talk');
        }

        function closeDialog() {
            dialogBox.classList.remove('show');
        }

        function getSickNote() {
            suspicion = Math.max(0, suspicion - 25);
            score += 150;
            closeDialog();
            playSound('success');
            document.getElementById('dialogText').textContent = '🧑‍⚕️ Медсестра: "Ладно, вот справка на 10 минут. Отдыхай."';
            document.getElementById('dialogOptions').innerHTML = '<button class="dialog-btn" onclick="closeDialog()">Спасибо!</button>';
            dialogBox.classList.add('show');
        }

        function hideInHideout(h) {
            if (h.safe) {
                suspicion = Math.max(0, suspicion - 20);
                score += 100;
                playSound('hide');
                document.getElementById('dialogText').textContent = `${h.emoji} Ты спрятался в "${h.name}". Подозрение снижено!`;
                document.getElementById('dialogOptions').innerHTML = '<button class="dialog-btn" onclick="closeDialog()">Тихо...</button>';
                dialogBox.classList.add('show');
            }
        }

        // ==================== ОБНОВЛЕНИЕ ====================
        function update() {
            if (!gameRunning) return;

            // Движение с джойстика
            if (joystickActive) {
                player.vx = joystickX * (player.isRunning ? player.runSpeed : player.speed);
                player.vy = joystickY * (player.isRunning ? player.runSpeed : player.speed);
            }
            // Движение с клавиатуры
            else {
                player.vx = 0;
                player.vy = 0;
                if (keys['w'] || keys['ArrowUp']) player.vy = -(player.isRunning ? player.runSpeed : player.speed);
                if (keys['s'] || keys['ArrowDown']) player.vy = (player.isRunning ? player.runSpeed : player.speed);
                if (keys['a'] || keys['ArrowLeft']) player.vx = -(player.isRunning ? player.runSpeed : player.speed);
                if (keys['d'] || keys['ArrowRight']) player.vx = (player.isRunning ? player.runSpeed : player.speed);
                if (keys['Shift'] && player.stamina > 0) player.isRunning = true;
                else if (!keys['Shift']) player.isRunning = false;
                if (keys[' '] && !player.isJumping) {
                    player.isJumping = true;
                    player.jumpVel = -8;
                }
            }

            // Стамина
            if (player.isRunning && (Math.abs(player.vx) > 0 || Math.abs(player.vy) > 0)) {
                player.stamina = Math.max(0, player.stamina - 0.5);
                if (player.stamina <= 0) player.isRunning = false;
            } else {
                player.stamina = Math.min(player.maxStamina, player.stamina + 0.3);
            }

            // Прыжок
            if (player.isJumping) {
                player.y += player.jumpVel;
                player.jumpVel += 0.5;
                if (player.y >= canvas.height - 100) {
                    player.y = canvas.height - 100;
                    player.isJumping = false;
                    player.jumpVel = 0;
                }
            }

            // Границы
            player.x += player.vx;
            player.y += player.vy;
            player.x = Math.max(30, Math.min(canvas.width - 30, player.x));
            player.y = Math.max(50, Math.min(canvas.height - 30, player.y));

            // Патрули учителей
            for (const t of teachers) {
                if (t.patrol === 'horizontal') {
                    t.x += t.vx;
                    if (t.x <= t.patrolMin || t.x >= t.patrolMax) t.vx *= -1;
                } else if (t.patrol === 'vertical') {
                    t.y += t.vy;
                    if (t.y <= t.patrolMin || t.y >= t.patrolMax) t.vy *= -1;
                } else {
                    t.x += t.vx;
                    t.y += t.vy;
                    if (t.x <= 30 || t.x >= canvas.width - 30) t.vx *= -1;
                    if (t.y <= 50 || t.y >= canvas.height - 30) t.vy *= -1;
                }

                // Проверка обнаружения
                const dx = player.x - t.x;
                const dy = player.y - t.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 60) {
                    suspicion = Math.min(100, suspicion + 0.3);
                    if (suspicion >= 100) {
                        caught();
                    }
                }
            }

            // Снижение подозрения если не обнаружен
            let nearTeacher = false;
            for (const t of teachers) {
                const dx = player.x - t.x;
                const dy = player.y - t.y;
                if (Math.sqrt(dx * dx + dy * dy) < 60) nearTeacher = true;
            }
            if (!nearTeacher) suspicion = Math.max(0, suspicion - 0.05);

            // Время
            gameTime += 1 / 60;
            if (gameTime >= DAY_LENGTH) {
                winDay();
            }
        }

        function caught() {
            gameRunning = false;
            playSound('fail');
            endScreen.classList.add('show');
            document.getElementById('endTitle').textContent = '💀 ПОЙМАН!';
            document.getElementById('endText').textContent = 'Директор вызвал родителей в школу...';
            document.getElementById('endScore').textContent = `Очки: ${score}`;
        }

        function winDay() {
            gameRunning = false;
            playSound('win');
            endScreen.classList.add('show');
            if (suspicion < 20) {
                document.getElementById('endTitle').textContent = '🏆 НИНДЗЯ!';
                document.getElementById('endText').textContent = 'Ты пережил день! Никто тебя не заметил!';
                score += 5000;
            } else if (suspicion < 50) {
                document.getElementById('endTitle').textContent = '👍 НОРМ!';
                document.getElementById('endText').textContent = 'День прошёл нормально. Почти не попался.';
                score += 2000;
            } else {
                document.getElementById('endTitle').textContent = '😰 ПРОНЕСЛО';
                document.getElementById('endText').textContent = 'Тебя чуть не поймали. В следующий раз будь осторожнее.';
                score += 500;
            }
            document.getElementById('endScore').textContent = `Очки: ${score}`;
        }

        // ==================== ОТРИСОВКА ====================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Пол
            ctx.fillStyle = '#2a1a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Сетка плитки
            ctx.strokeStyle = '#1a0a00';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Укрытия
            for (const h of hideouts) {
                ctx.fillStyle = 'rgba(0, 100, 0, 0.6)';
                ctx.fillRect(h.x, h.y, h.w, h.h);
                ctx.strokeStyle = '#0f0';
                ctx.lineWidth = 2;
                ctx.strokeRect(h.x, h.y, h.w, h.h);
                ctx.fillStyle = '#fff';
                ctx.font = '24px serif';
                ctx.fillText(h.emoji, h.x + 10, h.y + 35);
                ctx.font = '10px monospace';
                ctx.fillText(h.name, h.x + 5, h.y + 55);
            }

            // Учителя
            for (const t of teachers) {
                ctx.fillStyle = '#f44';
                ctx.beginPath();
                ctx.arc(t.x, t.y, 20, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = '20px serif';
                ctx.fillText(t.emoji, t.x - 12, t.y + 8);
                // Радиус обзора
                ctx.strokeStyle = 'rgba(255,0,0,0.2)';
                ctx.beginPath();
                ctx.arc(t.x, t.y, 60, 0, Math.PI * 2);
                ctx.stroke();
            }

            // NPC
            for (const n of npcs) {
                ctx.fillStyle = '#888';
                ctx.beginPath();
                ctx.arc(n.x, n.y, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = '18px serif';
                ctx.fillText(n.emoji, n.x - 10, n.y + 7);
                ctx.font = '8px monospace';
                ctx.fillText(n.name, n.x - 12, n.y - 18);
            }

            // Игрок
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.font = '16px serif';
            ctx.fillText('🧑', player.x - 10, player.y + 6);

            // Обновление интерфейса
            const hours = Math.floor(8 + gameTime / 60);
            const minutes = Math.floor((gameTime % 60));
            document.getElementById('timeDisplay').textContent = `🕐 ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            document.getElementById('suspicionFill').style.width = suspicion + '%';
            document.getElementById('suspicionText').textContent = Math.floor(suspicion) + '%';
            document.getElementById('staminaFill').style.width = player.stamina + '%';

            // Миникарта
            miniCtx.clearRect(0, 0, miniMapCanvas.width, miniMapCanvas.height);
            miniCtx.fillStyle = '#000';
            miniCtx.fillRect(0, 0, miniMapCanvas.width, miniMapCanvas.height);
            
            const scaleX = miniMapCanvas.width / canvas.width;
            const scaleY = miniMapCanvas.height / canvas.height;

            // Учителя на миникарте
            for (const t of teachers) {
                miniCtx.fillStyle = '#f44';
                miniCtx.fillRect(t.x * scaleX - 2, t.y * scaleY - 2, 4, 4);
            }

            // Игрок на миникарте
            miniCtx.fillStyle = '#ffd700';
            miniCtx.fillRect(player.x * scaleX - 3, player.y * scaleY - 3, 6, 6);

            // Укрытия на миникарте
            for (const h of hideouts) {
                miniCtx.fillStyle = '#0f0';
                miniCtx.fillRect(h.x * scaleX, h.y * scaleY, h.w * scaleX, h.h * scaleY);
            }
        }

        // ==================== ИГРОВОЙ ЦИКЛ ====================
        function gameLoop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(gameLoop);
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        canvas.width = canvas.offsetWidth || 400;
        canvas.height = canvas.offsetHeight || 700;
        miniMapCanvas.width = 90;
        miniMapCanvas.height = 90;
    </script>
</body>
