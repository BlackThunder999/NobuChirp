<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NOBUQR.SPACE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ГОСТЬ -->
  <div id="auth-screen">
    <div class="card">
      <div class="logo">NOBUQR.SPACE</div>
      <p class="muted">Премиальная социальная сеть</p>
      <button class="btn" onclick="openModal('login-modal')">Войти</button>
      <button class="btn outline" onclick="openModal('register-modal')">Регистрация</button>
      <p class="small">Регистрируясь, вы соглашаетесь с <span class="link" onclick="openDoc('terms')">условиями</span>, <span class="link" onclick="openDoc('privacy')">политикой</span> и <span class="link" onclick="openDoc('rules')">правилами</span>.</p>
    </div>
    <div class="links">
      <span class="link" onclick="openDoc('terms')">Условия</span>
      <span class="link" onclick="openDoc('privacy')">Конфиденциальность</span>
      <span class="link" onclick="openDoc('rules')">Правила</span>
    </div>
  </div>

  <!-- ПРИЛОЖЕНИЕ -->
  <div id="app" style="display:none;">
    <header>
      <div class="logo-sm">NOBUQR.SPACE</div>
      <button class="btn-sm" onclick="logout()">Выйти</button>
    </header>
    <main>
      <div id="tab-home" class="tab active"></div>
      <div id="tab-search" class="tab">
        <input type="text" id="search-input" placeholder="Поиск по #хештегу" oninput="onSearchInput()">
        <div id="search-results"></div>
      </div>
      <div id="tab-profile" class="tab"></div>
    </main>
    <nav>
      <button onclick="switchTab('home')">🏠</button>
      <button onclick="switchTab('search')">🔍</button>
      <button onclick="openPostModal()">＋</button>
      <button onclick="showProfile(currentUser.id)">👤</button>
      <button onclick="openAdminLogin()">⚙</button>
    </nav>
  </div>

  <!-- МОДАЛКИ -->
  <div id="login-modal" class="modal"><div class="modal-card"><span class="close" onclick="closeModal('login-modal')">&times;</span><h2>Вход</h2><input id="login-email" placeholder="Email"><input id="login-password" type="password" placeholder="Пароль"><button class="btn" onclick="login()">Войти</button></div></div>

  <div id="register-modal" class="modal"><div class="modal-card"><span class="close" onclick="closeModal('register-modal')">&times;</span><h2>Регистрация</h2><input id="reg-email" placeholder="Email"><input id="reg-nickname" placeholder="Никнейм"><input id="reg-password" type="password" placeholder="Пароль"><input id="reg-birthdate" type="date"><label><input type="checkbox" id="agree-checkbox"> Согласен с правилами</label><button class="btn" onclick="registerAndLogin()">Зарегистрироваться</button></div></div>

  <div id="post-modal" class="modal"><div class="modal-card"><span class="close" onclick="closeModal('post-modal')">&times;</span><h2>Новый пост</h2><textarea id="post-text" maxlength="280" placeholder="Что нового?"></textarea><div id="media-area"></div><div id="post-preview"></div><p id="post-warn" class="warn"></p><button class="btn" onclick="createChirp()">Опубликовать</button></div></div>

  <div id="comments-modal" class="modal"><div class="modal-card"><span class="close" onclick="closeModal('comments-modal')">&times;</span><h2>Комментарии</h2><div id="comments-list"></div><textarea id="comment-input" placeholder="Комментарий"></textarea><button class="btn" onclick="submitComment()">Отправить</button></div></div>

  <div id="report-modal" class="modal"><div class="modal-card"><span class="close" onclick="closeModal('report-modal')">&times;</span><h2>Жалоба</h2><textarea id="report-reason" placeholder="Причина"></textarea><button class="btn" onclick="submitReport()">Отправить</button></div></div>

  <div id="doc-modal" class="modal"><div class="modal-card doc"><span class="close" onclick="closeModal('doc-modal')">&times;</span><div id="doc-text"></div></div></div>

  <div id="admin-login-modal" class="modal"><div class="modal-card"><span class="close" onclick="closeModal('admin-login-modal')">&times;</span><h2>Админ</h2><input id="admin-pass-input" type="password" placeholder="Пароль"><button class="btn" onclick="adminLogin()">Войти</button></div></div>

  <div id="admin-panel-modal" class="modal"><div class="modal-card wide"><span class="close" onclick="closeModal('admin-panel-modal')">&times;</span><h2>Панель</h2><div class="tabs"><button onclick="adminTab('users')">Юзеры</button><button onclick="adminTab('reports')">Жалобы</button><button onclick="adminTab('messages')">Сообщения</button></div><div style="display:flex;gap:4px;margin:8px 0"><input id="delete-post-id" placeholder="ID поста" style="flex:1"><button class="btn-sm red" onclick="deleteChirpById()">Удалить</button></div><div id="admin-content"></div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
