<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диспетчерская | Sibiria Airlines</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e17, #1a1f2e);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .card {
            background: rgba(20,25,40,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(100,150,255,0.2);
        }
        h2 { margin-bottom: 15px; color: #7eb8ff; }
        .flight-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        button {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin: 2px;
        }
        .btn-depart { background: #ff9900; color: #000; }
        .btn-arrive { background: #00aa44; color: #fff; }
        .btn-delete { background: #cc3333; color: #fff; }
        .chat-box {
            height: 300px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .chat-input {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
        }
        .msg { padding: 5px 0; }
        .time { color: #666; font-size: 0.8em; }
        .back-btn {
            display: inline-block;
            margin-bottom: 15px;
            color: #7eb8ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← На главную</a>
        <div id="login" class="card">
            <h2>🔐 Доступ в диспетчерскую</h2>
            <input type="password" id="passInput" placeholder="Введите пароль" style="width:100%;margin-bottom:10px;">
            <button onclick="checkPass()" style="width:100%;">Войти</button>
            <p id="passError" style="color:#ff4444;margin-top:10px;"></p>
        </div>
        <div id="content" style="display:none;">
            <div class="card">
                <h2>📋 Управление рейсами</h2>
                <div id="flightsList"></div>
            </div>
            <div class="card">
                <h2>💬 Чат с пилотами</h2>
                <div class="chat-box" id="chatBox"></div>
                <div class="chat-input">
                    <input type="text" id="msgInput" placeholder="Сообщение...">
                    <button onclick="sendMsg()">Отправить</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const supabase = window.supabase.createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );

        function checkPass() {
            if (document.getElementById('passInput').value === 'Sibiria2026') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                loadFlights();
                loadChat();
            } else {
                document.getElementById('passError').textContent = 'Неверный пароль!';
            }
        }

        async function loadFlights() {
            const { data: flights } = await supabase.from('flights').select('*').order('departure_time');
            const list = document.getElementById('flightsList');
            list.innerHTML = flights.map(f => `
                <div class="flight-row">
                    <span><strong>${f.flight_number}</strong> ${f.departure}→${f.arrival} [${f.status}]</span>
                    <span>
                        ${f.status === 'scheduled' ? `<button class="btn-depart" onclick="updateStatus(${f.id},'departed')">Взлетел</button>` : ''}
                        ${f.status === 'departed' ? `<button class="btn-arrive" onclick="updateStatus(${f.id},'arrived')">Сел</button>` : ''}
                        <button class="btn-delete" onclick="deleteFlight(${f.id})">Удалить</button>
                    </span>
                </div>
            `).join('');
        }

        async function updateStatus(id, status) {
            await supabase.from('flights').update({ status }).eq('id', id);
            loadFlights();
        }

        async function deleteFlight(id) {
            if (confirm('Удалить рейс?')) {
                await supabase.from('flights').delete().eq('id', id);
                loadFlights();
            }
        }

        async function loadChat() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            const box = document.getElementById('chatBox');
            box.innerHTML = data.map(m => `<div class="msg"><strong>${m.sender}:</strong> ${m.text} <span class="time">${new Date(m.created_at).toLocaleTimeString()}</span></div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            await supabase.from('messages').insert({ text: input.value, sender: 'Диспетчер' });
            input.value = '';
        }

        supabase.channel('realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'flights' }, loadFlights).subscribe();
        supabase.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, loadChat).subscribe();
    </script>
</body>
</html>
